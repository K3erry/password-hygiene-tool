<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 280px; padding: 15px; font-family: -apple-system, sans-serif; }
    h3 { margin-top: 0; color: #4a90e2; display: flex; align-items: center; gap: 8px; }
    .status-box { background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 15px; }
    button { 
      width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer;
      background: #4a90e2; color: white; border: none; border-radius: 5px; font-weight: 600;
    }
    #syncStatus { font-size: 11px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
  </style>
</head>
<body>
  <h3>🔒 Password Meter</h3>
  
  <div class="status-box">
    <button id="toggleMeter">Show/Hide Meter</button>
    <button id="checkPage" style="background: #6c757d;">Scan Page for Forms</button>
    <div id="syncStatus">Checking sync...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
