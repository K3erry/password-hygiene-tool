<!DOCTYPE html>
<html>
<head>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    /* Main container - now draggable */
    #popup-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      border: 1px solid #e0e0e0;
    }
    
    /* Draggable header */
    .popup-header {
      background: #4a90e2;
      color: white;
      padding: 12px 16px;
      cursor: grab;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .popup-header:active {
      cursor: grabbing;
    }
    
    .popup-title {
      font-weight: 600;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .popup-controls {
      display: flex;
      gap: 8px;
    }
    
    .popup-controls button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    
    .popup-controls button:hover {
      background: rgba(255,255,255,0.3);
    }
    
    .popup-controls button.close-btn:hover {
      background: #dc3545;
    }
    
    /* Content area */
    .popup-content {
      padding: 16px;
    }
    
    .status-box {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #eee;
      margin-bottom: 15px;
    }
    
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: 600;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #3a7bc8;
    }
    
    button#checkPage {
      background: #6c757d;
    }
    
    button#checkPage:hover {
      background: #5a6268;
    }
    
    #syncStatus {
      font-size: 11px;
      margin-top: 10px;
      border-top: 1px solid #eee;
      padding-top: 8px;
      color: #6c757d;
    }
    
    /* Minimized state */
    #popup-container.minimized .popup-content {
      display: none;
    }
    
    #popup-container.minimized {
      width: 200px;
    }
    
    /* Resize handle */
    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 15px;
      height: 15px;
      cursor: se-resize;
      background: linear-gradient(135deg, transparent 50%, #4a90e2 50%);
      opacity: 0.5;
    }
    
    .resize-handle:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="popup-container">
    <div class="popup-header" id="drag-handle">
      <div class="popup-title">
        <span>🔒</span> Password Meter
      </div>
      <div class="popup-controls">
        <button id="minimize-btn" title="Minimize">−</button>
        <button id="close-btn" class="close-btn" title="Close">×</button>
      </div>
    </div>
    
    <div class="popup-content">
      <div class="status-box">
        <button id="toggleMeter">Show/Hide Meter</button>
        <button id="checkPage" style="background: #6c757d;">Scan Page for Forms</button>
        <div id="syncStatus">Checking sync...</div>
      </div>
      
      <!-- Privacy info section (for your proposal) -->
      <div style="font-size: 11px; color: #6c757d; padding: 8px; background: #f8f9fa; border-radius: 5px;">
        <strong>🔐 Privacy Protected:</strong> Your passwords never leave this device
      </div>
    </div>
    
    <div class="resize-handle" id="resize-handle"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
